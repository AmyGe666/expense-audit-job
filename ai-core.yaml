apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: expense-audit-job
  annotations:
    scenarios.ai.sap.com/description: "Expense Audit Job - Automated expense audit"
    scenarios.ai.sap.com/name: "expense-audit"
  labels:
    scenarios.ai.sap.com/id: "expense-audit"
    ai.sap.com/version: "1.0.0"

spec:
  arguments:
    parameters:
    - name: batch-size
      value: "100"

  entrypoint: expense-audit-main

  templates:
  - name: expense-audit-main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter

    inputs:
      parameters:
      - name: batch-size
        value: "{{workflow.parameters.batch-size}}"

    container:
      image: ghcr.io/amyge666/expense-audit-job:main
      imagePullPolicy: Always

      command:
      - python
      - main.py

      env:
      - name: HANA_HOST
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: host

      - name: HANA_PORT
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: port

      - name: HANA_USER
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: user

      - name: HANA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: password

      - name: HANA_SCHEMA
        value: "EXPENSE_SCHEMA"

      - name: BATCH_SIZE
        value: "{{inputs.parameters.batch-size}}"

      resources:
        limits:
          cpu: "1"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "1Gi"
