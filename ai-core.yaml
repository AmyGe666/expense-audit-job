apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: expense-audit-job
  annotations:
    scenarios.ai.sap.com/description: "Expense Audit Job - Automated expense audit"
    scenarios.ai.sap.com/name: "expense-audit"
  labels:
    scenarios.ai.sap.com/id: "expense-audit"
    ai.sap.com/version: "1.0.0"

spec:
  # 定义输入参数（可选）
  arguments:
    parameters:
    - name: batch-size
      description: "Number of expenses to process in one batch"
      default: "100"

  # 定义 Job 模板
  templates:
  - name: expense-audit-main
    metadata:
      labels:
        ai.sap.com/resourcePlan: starter  # 资源计划：starter, basic, advanced

    # 容器配置
    container:
      # GitHub Container Registry 镜像地址
      image: ghcr.io/amyge666/expense-audit-job:main
      imagePullPolicy: Always

      # 启动命令（默认使用 Dockerfile 中的 CMD）
      command:
      - python
      args:
      - main.py

      # 环境变量配置
      env:
      # HANA 连接信息（从 AI Core Secret 注入）
      - name: HANA_HOST
        valueFrom:
          secretKeyRef:
            name: hana-credentials  # 在 AI Core 中创建的 Secret 名称
            key: host

      - name: HANA_PORT
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: port

      - name: HANA_USER
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: user

      - name: HANA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: hana-credentials
            key: password

      - name: HANA_SCHEMA
        value: "EXPENSE_SCHEMA"

      # 可选：批处理大小参数
      - name: BATCH_SIZE
        value: "{{workflow.parameters.batch-size}}"

      # 资源限制
      resources:
        limits:
          cpu: "1"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "1Gi"

  # 入口点
  entrypoint: expense-audit-main
